packaging_format = 2

id = "abantecart"
name = "Abantecart"
description.en = "Ecommerce platform to power online retail"
description.fr = "Plateforme de commerce électronique pour la vente au détail en ligne"

version = "1.4.2~ynh1"

maintainers = []

[upstream]
license = "OSL-3.0"
website = "https://www.abantecart.com/"
demo = "https://www.abantecart.com/shopping-cart-demo"
admindoc = "https://docs.abantecart.com/"
userdoc = "https://abantecart.atlassian.net/wiki/spaces/AD/overview?homepageId=3506313"
code = "https://github.com/abantecart/abantecart-src"

[integration]
yunohost = ">= 12.0.9"
helpers_version = "2.1"
architectures = "all"
multi_instance = false

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.admin]
    type = "user"

    [install.password]
    type = "password"
    optional = false

[resources]
        [resources.sources.main]
        url = "https://github.com/abantecart/abantecart-src/archive/refs/tags/1.4.2.tar.gz"
        sha256 = "b03d488bd291fb4b160aaf9a212e8ea7ebb98c7de599957df9b3de56567edfda"
        autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]
    group = "www-data:r-x"

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "mariadb-server, php8.4-iconv, php8.4-mbstring, php8.4-mysqli, php8.4-zip, php8.4-curl, php8.4-gd, php8.4-xml"

    [resources.database]
    type = "mysql"
